spring.application.name=cafeAurora

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/changeme}
spring.datasource.username=${DB_USERNAME:change_user}
spring.datasource.password=${DB_PASSWORD:change_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1

spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.jdbc.use_streams_for_lob=true

spring.jpa.properties.hibernate.jdbc.use_streams_for_binary=false
spring.datasource.hikari.connection-init-sql=DEALLOCATE ALL

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${CORREO_EMAIL:change_email}
spring.mail.password=${PASSWORD:change_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

supabase.url=${SUPABASE_URL:https://change-me.supabase.co}
supabase.key=${SUPABASE_KEY:change_me}
supabase.jwt.secret=${SUPABASE_JWT_SECRET:change_me}
supabase.anon.key=${SUPABASE_ANONKEY:change_me}
supabase.service.key=${TU_SERVICE_ROLE_KEY:change_me}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:tu-cloud-name}
cloudinary.api-key=${CLOUDINARY_API_KEY:tu-api-key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:tu-api-secret}
